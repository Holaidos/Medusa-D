<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz · MEDUSA</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { --bg: #0a0e27; --card: rgba(255,255,255,0.03); --card-border: rgba(255,255,255,0.08); --text: #dbe5df; --text-muted: #94a3b8; --primary: #00b4ff; --secondary: #c77dff; --success: #10b981; --error: #ef4444; }
  [data-theme="light"] { --bg: #f0f9ff; --card: rgba(255,255,255,0.8); --card-border: rgba(0,180,255,0.3); --text: #0c1512; --text-muted: #5a6b65; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
  .nav-fixed { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: rgba(10,14,39,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px 24px; }
  [data-theme="light"] .nav-fixed { background: rgba(255,255,255,0.85); }
  .nav-link { color: var(--text-muted); text-decoration: none; padding: 8px 12px; border-radius: 8px; font-size: 14px; transition: all 0.2s; }
  .nav-link:hover, .nav-link.active { color: var(--primary); background: rgba(0,180,255,0.1); }
  .nav-link.active { font-weight: 700; }
  .theme-toggle-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(0,180,255,0.3); border-radius: 999px; padding: 6px 12px; cursor: pointer; color: var(--text); font-size: 14px; }
  [data-theme="light"] .theme-toggle-btn { background: rgba(0,180,255,0.1); color: #0c1512; }
  .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 16px; padding: 24px; }
  [data-theme="light"] .card { background: var(--card); }
  .badge { display: inline-block; padding: 2px 8px; background: rgba(255,255,255,0.05); border-radius: 999px; font-size: 11px; }
  [data-theme="light"] .badge { background: rgba(0,180,255,0.1); }
  .opt-btn { width: 100%; padding: 14px 16px; border-radius: 8px; text-align: left; background: rgba(255,255,255,0.03); color: var(--text); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; gap: 12px; font-size: 15px; font-family: inherit; }
  [data-theme="light"] .opt-btn { background: rgba(255,255,255,0.7); color: #0c1512; border: 1px solid rgba(0,180,255,0.3); }
  .opt-btn:hover:not(:disabled) { background: rgba(0,180,255,0.1); border-color: var(--primary); }
  .opt-btn:disabled { cursor: not-allowed; }
  .opt-correct { background: rgba(16,185,129,0.3) !important; border-color: var(--success) !important; color: var(--success) !important; }
  .opt-incorrect { background: rgba(239,68,68,0.3) !important; border-color: var(--error) !important; color: var(--error) !important; }
  [data-theme="light"] .opt-correct { color: #064e3b !important; }
  [data-theme="light"] .opt-incorrect { color: #7f1d1d !important; }
  .feedback { background: rgba(0,180,255,0.08); border: 1px solid rgba(0,180,255,0.25); border-radius: 8px; padding: 16px; margin-top: 16px; display: none; }
  [data-theme="light"] .feedback { color: #0c1512; }
  .feedback.show { display: block; }
  .feedback.correct { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.4); }
  .feedback.incorrect { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); }
  .next-btn { background: var(--primary); color: #0a0e27; font-weight: 700; padding: 12px 32px; border-radius: 999px; border: none; cursor: pointer; font-size: 14px; margin-top: 24px; transition: all 0.2s; }
  .next-btn:hover { box-shadow: 0 0 20px rgba(0, 180, 255, 0.5); }
  .next-btn:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); cursor: not-allowed; box-shadow: none; }
  .tab-btn { padding: 16px 20px; background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; cursor: pointer; transition: all 0.2s; text-align: left; }
  [data-theme="light"] .tab-btn { background: var(--card); }
  .tab-btn.active { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 180, 255, 0.3); }
  .tab-btn:hover:not(.active) { border-color: rgba(0, 180, 255, 0.4); }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-bottom: 16px; }
  .progress-bar > div { height: 100%; background: var(--primary); transition: width 0.3s; }
  .question-text { font-size: 18px; font-weight: 600; margin-bottom: 16px; line-height: 1.4; }
</style>
<link rel="stylesheet" href="responsive.css">
</head>
<body>

<nav class="nav-fixed">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <a href="index.html" style="color: var(--primary); font-weight: 800; font-size: 18px; text-decoration: none; letter-spacing: 0.1em;">MEDUSA</a>
    <div class="hidden md:flex gap-2">
      <a href="index.html" class="nav-link">Inicio</a>
      <a href="species.html" class="nav-link">Especies</a>
      <a href="biology.html" class="nav-link">Biología</a>
      <a href="culture.html" class="nav-link">Cultura</a>
      <a href="articles.html" class="nav-link">Articles</a>
      <a href="quiz.html" class="nav-link active">Quiz</a>
    </div>
    <button id="theme-btn" class="theme-toggle-btn" aria-label="Cambiar tema">🌙</button>
  </div>
</nav>

<main style="max-width: 800px; margin: 0 auto; padding: 100px 24px 40px;">

  <header style="text-align: center; margin-bottom: 32px;">
    <h1 class="quiz-title">🧠 CUESTIONARIO</h1>
    <p style="color: var(--text-muted); font-size: 1.1rem;">Pon a prueba tus conocimientos sobre las medusas. 3 niveles de dificultad.</p>
  </header>

  <div id="difficulty-tabs" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px;">
    <button class="tab-btn" data-diff="principiante" style="border-color: var(--primary); box-shadow: 0 0 20px rgba(0,180,255,0.3);">
      <div class="badge" style="color: var(--success);">NIVEL 01</div>
      <div style="font-weight: 700; margin-top: 4px;">PRINCIPIANTE</div>
      <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">Conceptos básicos</div>
    </button>
    <button class="tab-btn" data-diff="intermedio">
      <div class="badge" style="color: var(--secondary);">NIVEL 02</div>
      <div style="font-weight: 700; margin-top: 4px;">INTERMEDIO</div>
      <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">Ecología y ciclos</div>
    </button>
    <button class="tab-btn" data-diff="experto">
      <div class="badge" style="color: #ef4444;">NIVEL 03</div>
      <div style="font-weight: 700; margin-top: 4px;">EXPERTO</div>
      <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">Toxicología avanzada</div>
    </button>
  </div>

  <div id="quiz-area">
    <div class="card">
      <div class="flex items-center justify-between mb-2" style="font-family: monospace; font-size: 13px;">
        <span id="progress-text" style="color: var(--primary);"></span>
        <span id="score-text" style="color: var(--text-muted);"></span>
      </div>
      <div class="progress-bar"><div id="progress-fill" style="width: 0%;"></div></div>

      <div id="question-text" class="question-text"></div>
      <div id="options-container" style="display: flex; flex-direction: column; gap: 8px;"></div>

      <div id="feedback" class="feedback">
        <div id="feedback-icon" style="font-size: 24px; margin-bottom: 8px;"></div>
        <div id="feedback-text" style="font-weight: 600;"></div>
        <div id="feedback-explanation" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 8px;"></div>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px;">
        <span id="q-counter" style="font-size: 0.8rem; color: var(--text-muted);"></span>
        <button id="next-btn" class="next-btn">SIGUIENTE →</button>
      </div>
    </div>
  </div>

  <div id="results-area" style="display: none;">
    <div class="card" style="text-align: center;">
      <div style="font-size: 4rem; margin-bottom: 16px;">🏆</div>
      <h2 style="font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 16px;">Resultado</h2>
      <div id="final-score" style="font-size: 4rem; font-weight: 900; color: var(--primary); margin-bottom: 8px;"></div>
      <div id="final-percent" style="color: var(--text-muted); margin-bottom: 16px;"></div>
      <div id="result-message" style="font-size: 1.1rem; margin-bottom: 24px;"></div>
      <div style="display: flex; gap: 12px; justify-content: center;">
        <button id="restart-btn" class="next-btn">REINTENTAR</button>
        <a href="index.html" class="next-btn" style="text-decoration: none; background: transparent; color: var(--primary); border: 1px solid var(--primary);">VOLVER</a>
      </div>
    </div>
  </div>

</main>

<script>
(function() {
  'use strict';

  var SUPABASE_URL = 'https://ohwwehbadhtysmwjvfoy.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9od3dlaGJhZGh0eXNtd2p2Zm95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MTg0MjMsImV4cCI6MjA5OTA5NDQyM30.DtlcpFcDbONfjjTiIcL4PlX0sscv7ccRkwYoX_WMCp0';
  var QUESTIONS_PER_QUIZ = 8;

  var QUIZ_BANK = { principiante: [], intermedio: [], experto: [] };
  var currentQuiz = [];
  var currentDiff = 'principiante';
  var currentIndex = 0;
  var score = 0;
  var answered = false;

  var els = {
    tabs: document.querySelectorAll('.tab-btn'),
    quizArea: document.getElementById('quiz-area'),
    resultsArea: document.getElementById('results-area'),
    qText: document.getElementById('question-text'),
    qOptions: document.getElementById('options-container'),
    qProgress: document.getElementById('progress-text'),
    qProgressFill: document.getElementById('progress-fill'),
    qScore: document.getElementById('score-text'),
    qCounter: document.getElementById('q-counter'),
    qFeedback: document.getElementById('feedback'),
    qFeedbackIcon: document.getElementById('feedback-icon'),
    qFeedbackText: document.getElementById('feedback-text'),
    qFeedbackExplanation: document.getElementById('feedback-explanation'),
    nextBtn: document.getElementById('next-btn'),
    restartBtn: document.getElementById('restart-btn'),
    finalScore: document.getElementById('final-score'),
    finalPercent: document.getElementById('final-percent'),
    resultMessage: document.getElementById('result-message'),
    themeBtn: document.getElementById('theme-btn')
  };

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    if (els.themeBtn) els.themeBtn.textContent = t === 'dark' ? '🌙' : '☀️';
  }
  applyTheme(localStorage.getItem('jellyfish-theme') || 'dark');
  if (els.themeBtn) {
    els.themeBtn.addEventListener('click', function() {
      var cur = document.documentElement.getAttribute('data-theme');
      var next = cur === 'dark' ? 'light' : 'dark';
      localStorage.setItem('jellyfish-theme', next);
      applyTheme(next);
    });
  }

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  function pickQuestions(diff) {
    var bank = QUIZ_BANK[diff];
    if (!bank || bank.length === 0) return [];
    var count = Math.min(QUESTIONS_PER_QUIZ, bank.length);
    var shuffled = shuffle(bank.slice());
    return shuffled.slice(0, count);
  }

  fetch(SUPABASE_URL + '/rest/v1/quiz_questions?order=id.asc', {
    headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(questions) {
    questions.forEach(function(q) {
      var diff = q.difficulty;
      if (!QUIZ_BANK[diff]) QUIZ_BANK[diff] = [];
      QUIZ_BANK[diff].push({
        q: q.question,
        a: [q.option_a, q.option_b, q.option_c, q.option_d],
        c: { A: 0, B: 1, C: 2, D: 3 }[q.correct_answer] || 0,
        e: q.explanation
      });
    });
    setDiff('principiante');
  })
  .catch(function() {
    document.getElementById('question-text').textContent = 'Error al cargar preguntas desde Supabase';
  });

  function render() {
    var total = currentQuiz.length;
    if (total === 0) {
      els.qText.textContent = 'No hay preguntas disponibles para este nivel.';
      return;
    }
    var q = currentQuiz[currentIndex];
    answered = false;
    els.qText.textContent = q.q;
    els.qProgress.textContent = 'Pregunta ' + (currentIndex + 1) + ' de ' + total;
    els.qScore.textContent = 'Puntaje: ' + score;
    els.qProgressFill.style.width = (((currentIndex + 1) / total) * 100) + '%';
    els.qCounter.textContent = (currentIndex + 1) + ' / ' + total;
    els.qFeedback.classList.remove('show', 'correct', 'incorrect');
    els.nextBtn.textContent = (currentIndex === total - 1) ? 'VER RESULTADOS' : 'SIGUIENTE →';
    els.nextBtn.disabled = true;

    els.qOptions.innerHTML = '';
    q.a.forEach(function(opt, idx) {
      var btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.type = 'button';
      btn.innerHTML = '<span>' + opt + '</span><span style="opacity:0.5;font-size:18px;">○</span>';
      btn.addEventListener('click', function() { selectOption(idx, btn); });
      els.qOptions.appendChild(btn);
    });
  }

  function selectOption(idx, btn) {
    if (answered) return;
    answered = true;
    var q = currentQuiz[currentIndex];
    var allBtns = els.qOptions.querySelectorAll('.opt-btn');
    allBtns.forEach(function(b) { b.disabled = true; });

    if (idx === q.c) {
      btn.classList.add('opt-correct');
      btn.querySelector('span:last-child').textContent = '✓';
      btn.querySelector('span:last-child').style.opacity = '1';
      score++;
      els.qFeedback.classList.add('show', 'correct');
      els.qFeedbackIcon.textContent = '✓';
      els.qFeedbackText.textContent = '¡Correcto!';
      els.qFeedbackText.style.color = '#10b981';
    } else {
      btn.classList.add('opt-incorrect');
      btn.querySelector('span:last-child').textContent = '✗';
      btn.querySelector('span:last-child').style.opacity = '1';
      var correctBtn = allBtns[q.c];
      if (correctBtn) {
        correctBtn.classList.add('opt-correct');
        correctBtn.querySelector('span:last-child').textContent = '✓';
        correctBtn.querySelector('span:last-child').style.opacity = '1';
      }
      els.qFeedback.classList.add('show', 'incorrect');
      els.qFeedbackIcon.textContent = '✗';
      els.qFeedbackText.textContent = 'Incorrecto';
      els.qFeedbackText.style.color = '#ef4444';
    }
    els.qFeedbackExplanation.textContent = q.e;
    els.qScore.textContent = 'Puntaje: ' + score;
    els.nextBtn.disabled = false;
  }

  function showResults() {
    els.quizArea.style.display = 'none';
    els.resultsArea.style.display = 'block';
    var total = currentQuiz.length;
    var pct = Math.round((score / total) * 100);
    els.finalScore.textContent = score + ' / ' + total;
    els.finalPercent.textContent = pct + '% de respuestas correctas';
    var msg = '';
    if (pct === 100) msg = '🏆 ¡Perfecto! Eres un maestro de las medusas.';
    else if (pct >= 80) msg = '🎉 ¡Excelente! Conoces mucho sobre medusas.';
    else if (pct >= 60) msg = '👍 Bien. Sabes más que la mayoría de la gente.';
    else if (pct >= 40) msg = '📚 No está mal. Te recomendamos leer la enciclopedia.';
    else msg = '💪 Necesitas estudiar más. ¡Vuelve a intentarlo!';
    els.resultMessage.textContent = msg;
  }

  function setDiff(diff) {
    currentDiff = diff;
    currentQuiz = pickQuestions(diff);
    currentIndex = 0;
    score = 0;
    answered = false;
    els.tabs.forEach(function(t) {
      t.classList.remove('active');
      t.style.borderColor = 'var(--card-border)';
      t.style.boxShadow = 'none';
    });
    var activeTab = document.querySelector('.tab-btn[data-diff="' + diff + '"]');
    if (activeTab) {
      activeTab.classList.add('active');
      activeTab.style.borderColor = 'var(--primary)';
      activeTab.style.boxShadow = '0 0 20px rgba(0, 180, 255, 0.3)';
    }
    els.quizArea.style.display = 'block';
    els.resultsArea.style.display = 'none';
    render();
  }

  els.tabs.forEach(function(t) {
    t.addEventListener('click', function() { setDiff(t.dataset.diff); });
  });

  els.nextBtn.addEventListener('click', function() {
    var total = currentQuiz.length;
    if (currentIndex < total - 1) {
      currentIndex++;
      render();
    } else {
      showResults();
    }
  });

  els.restartBtn.addEventListener('click', function() { setDiff(currentDiff); });
})();
</script>

<script src="jellyfish-bg.js"></script>
<script src="https://js.puter.com/v2/"></script>
<script src="chatbot.js"></script>
</body>
</html>
